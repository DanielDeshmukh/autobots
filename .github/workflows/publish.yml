name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers on semantic version tags, e.g., v0.1.3

jobs:
  build-n-publish:
    name: Build and publish Python distro to PyPI
    runs-on: ubuntu-latest
    
    # Required permissions for Trusted Publishing (OIDC)
    permissions:
      id-token: write  # To authenticate with PyPI
      contents: read   # To checkout the code

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Build Tools
      run: python -m pip install --upgrade pip build

    - name: Build Distributions
      # Generates sdist and wheel based on pyproject.toml
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # Matches the 'Environment name' you set in PyPI
        environment-name: pypi