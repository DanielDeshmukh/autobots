name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # This triggers the workflow when you push a tag like v0.1.2

jobs:
  build-n-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Mandatory for Trusted Publishing (OIDC)

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: python -m pip install --upgrade pip build

    - name: Build Distributions
      # This will look at your pyproject.toml and create the /dist folder automatically
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # This points to the GitHub Environment we named in the PyPI settings
        environment-name: pypi